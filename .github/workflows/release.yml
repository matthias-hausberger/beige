name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # Check if the version has a pre-release suffix (anything after a hyphen)
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(.+))$ ]]; then
            SUFFIX="${BASH_REMATCH[2]}"
            echo "prerelease=true" >> $GITHUB_OUTPUT
            # Extract the label part (letters only) from the suffix; fall back to "next"
            LABEL=$(echo "$SUFFIX" | sed 's/[^a-zA-Z].*//')
            if [[ -z "$LABEL" ]]; then
              LABEL="next"
            fi
            echo "npm_tag=$LABEL" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Update package version
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: |
          pnpm publish --no-git-checks --provenance --tag ${{ steps.version.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
